theme = "one-dark"

[editor]
tab_size = 4
insert_spaces = true
line_numbers = "absolute"
scroll_off = 5
mouse_enabled = true

[ui]
sidebar_width = 30
sidebar_visible = true
show_minimap = false
show_tab_bar = true 
show_top_bar = true
tree_style = true 
show_file_type_emoji = true 
respect_gitignore = false

