[meta]
name = "Gruvbox Dark"

[palette]
bg = "#282828"
bg0_h = "#1d2021"
bg1 = "#3c3836"
bg2 = "#504945"
fg = "#ebdbb2"
fg4 = "#a89984"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
purple = "#b16286"
aqua = "#689d6a"
orange = "#d65d0e"
gray = "#928374"
bright_red = "#fb4934"
bright_green = "#b8bb26"
bright_yellow = "#fabd2f"
bright_blue = "#83a598"
bright_purple = "#d3869b"
bright_aqua = "#8ec07c"
bright_orange = "#fe8019"

[ui]
background = "bg"
foreground = "fg"
cursor = "#fe8019"
selection = "bg2"
cursor_line_bg = "bg1"
line_number = "bg2"
line_number_active = "bright_yellow"
status_bar_bg = "bg0_h"
status_bar_fg = "fg"
tab_active_bg = "bg"
tab_inactive_bg = "bg0_h"
sidebar_bg = "bg0_h"
sidebar_fg = "fg"
border = "bg1"
error = "bright_red"
warning = "bright_yellow"
info = "bright_blue"
hint = "bright_aqua"
search_match = "bright_yellow"
search_match_active = "bright_orange"
pane_focus_style = "title_bar"
pane_active_fg = "bg"
pane_active_bg = "bright_blue"
pane_inactive_fg = "gray"
pane_inactive_bg = "bg0_h"

[scopes]
"attribute" = { fg = "bright_aqua" }
"comment" = { fg = "gray", italic = true }
"constant" = { fg = "bright_purple" }
"constant.numeric" = { fg = "bright_purple" }
"constant.character" = { fg = "bright_green" }
"constant.character.escape" = { fg = "bright_orange" }
"constructor" = { fg = "bright_green" }
"function" = { fg = "bright_green" }
"function.macro" = { fg = "bright_aqua" }
"function.builtin" = { fg = "bright_yellow" }
"keyword" = { fg = "bright_red" }
"keyword.control" = { fg = "bright_red" }
"keyword.control.return" = { fg = "bright_red" }
"keyword.control.import" = { fg = "bright_aqua" }
"keyword.operator" = { fg = "bright_red" }
"keyword.function" = { fg = "bright_red" }
"label" = { fg = "bright_aqua" }
"namespace" = { fg = "bright_yellow" }
"operator" = { fg = "fg" }
"punctuation" = { fg = "fg" }
"punctuation.bracket" = { fg = "fg" }
"punctuation.delimiter" = { fg = "fg" }
"string" = { fg = "bright_green" }
"string.special" = { fg = "bright_orange" }
"type" = { fg = "bright_yellow" }
"type.builtin" = { fg = "bright_yellow" }
"variable" = { fg = "bright_blue" }
"variable.builtin" = { fg = "bright_orange" }
"variable.parameter" = { fg = "bright_blue" }
"tag" = { fg = "bright_red" }
"special" = { fg = "bright_orange" }
